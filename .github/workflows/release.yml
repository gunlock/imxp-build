name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myplugin-build .

      - name: Build plugin
        run: docker run --rm -v "$PWD":/src myplugin-build scripts/build-all.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/docker/deploy/MyPlugin.zip
          generate_release_notes: true
